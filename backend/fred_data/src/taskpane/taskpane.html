<!-- This file shows how to design a first-run page that provides a welcome screen to the user about the features of the add-in. -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>FRED Data Tools</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Custom styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <div id="app">
        <h2>FRED Data Tools</h2>

        <!-- Search Button Configuration-->
        <input type="url" id="searchInput" name="SearchInput" placeholder="Enter FRED URL: " />
        <button onclick="search()">Search</button>

        <!-- Button container for add-in actions -->
        <div id="button-container">
            <button id="btnGetCategories">Get Categories</button>
            <button id="btnGetSeries">Get Series in Category</button>
            <button id="btnGetData">Get Data for Series</button>
        </div>

        <div id="output"></div>
    </div>
<script src="taskpane.js"></script>
</body>
</html>
