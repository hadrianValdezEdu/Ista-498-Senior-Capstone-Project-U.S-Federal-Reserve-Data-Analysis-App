<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>FRED Data Tools</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Custom styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <div id="app">
        <h1 style="display: flex; justify-content: center; height: 20px;">FRED Data Search</h1>

        <br>

        <!-- Search box -->
        <div id="search-container">
            <input 
                type="text" 
                id="searchInput" 
                name="SearchInput" 
                placeholder="Enter Series ID or FRED URL"
            />
            <button id="btnSearch"><strong>Search</strong></button>
        </div>

        <!-- Main action buttons -->
    <div style="display: flex; justify-content: center; align-items: center;" class="button-container">
        <button id="btnGetCategories">Get Categories</button>
        <button id="btnBack" disabled>Back</button>
        <button id="btnQuickRecall" disabled>Quick Recall Last Series</button>
        <button id="btnViewBookmarks" disabled>View Bookmarks</button>
        <button id="btnLoadDataCurrentSheet" disabled>Load Data into Current Sheet</button>
        <button id="btnLoadDataNewSheet" disabled>Load Data into New Sheet</button>
        <button id="btnStatisticalAnalysis" disabled>Statistical Analysis</button>
        <button id="btnResetCache">Reset Cache</button>
    </div>

        <!-- Dynamic content -->
        <div id="info"></div>
        <div id="output"></div>
        
    </div>



    <script src="taskpane.js"></script>
</body>
</html>
