<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>FRED Data Tools</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Custom styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <div id="app">
        <h1 style="display: flex; justify-content: center; height: 20px;">FRED Data Search</h1>

        <br>

        <!-- Search box -->
        <div id="search-container">
            <input 
                type="text" 
                id="searchInput" 
                name="SearchInput" 
                placeholder="Enter Series ID or FRED URL"
            />
            <button id="btnSearch"><strong>Search</strong></button>
            <button id="connorsbtn" onclick="window.open('https://www.youtube.com/watch?v=oHg5SJYRHA0', '_blank');">ML Button</button>
        </div>

        <div id="sort-container" style="margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <label for="seriesSort">Sort Series By:</label>
            <select id="seriesSort" style="padding: 4px; border-radius: 4px;">
                <option value="popularity">Popularity</option>
                <option value="last_updated">Updated</option>
                <option value="observation_end">OBS End</option>
                <option value="observation_start">OBS Start</option>
                <option value="title">Title</option>
                <option value="frequency">Frequency</option>
                <option value="units">Units</option>
                <option value="seasonal_adjustment">Seasonal Adjustment</option>
            </select>
            <div style="margin-left: 15px;">
                <input type="checkbox" id="toggleDiscontinued" style="margin-right: 5px;">
                <label for="toggleDiscontinued">Show Discontinued</label>
            </div>
        </div>

        <!-- Main action buttons -->
    <div style="display: flex; justify-content: center; align-items: center;" class="button-container">
        <button id="btnGetCategories">Get Categories</button>
        <button id="btnBack" disabled>Back</button>
        <button id="btnLoadDataCurrentSheet" disabled>Load Data into Current Sheet</button>
        <button id="btnLoadDataNewSheet" disabled>Load Data into New Sheet</button>
    </div>
    <!-- Secondary Action Buttons -->
    <div style="display: flex; justify-content: center; align-items: center;" class="button-container">
        <button id="btnStatisticalAnalysis" disabled>Statistical Analysis</button>
        <button id="btnQuickRecall" disabled>Quick Recall Last Series</button>
        <button id="btnViewBookmarks" disabled>View Bookmarks</button>
        <button id="btnResetCache">Reset Cache</button>
    </div>

        <!-- Dynamic content -->
        <div id="info"></div>
        <div id="output"></div>
        
    </div>



    <script src="taskpane.js"></script>
</body>
</html>
