<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>FRED Data Tools</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Custom styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <div id="app">
        <h2>FRED Data Tools</h2>

        <!-- Search box -->
        <div id="search-container">
            <input 
                type="text" 
                id="searchInput" 
                name="SearchInput" 
                placeholder="Enter Series ID or FRED URL"
            />
            <button id="btnSearch">Search</button>
        </div>

        <!-- Main action buttons -->
    <div id="button-container">
        <button id="btnGetCategories">Get Categories</button>
        <button id="btnBack" disabled>Back</button>
        <button id="btnLoadData" disabled>Load Data into Excel</button>
    </div>

        <!-- Dynamic content -->
        <div id="output"></div>
        <div id="info"></div>
    </div>



    <script src="taskpane.js"></script>
</body>
</html>
